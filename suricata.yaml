%YAML 1.1
---

vars:
  address-groups:
    HOME_NET: "[10.0.2.0/24]"
    EXTERNAL_NET: "!$HOME_NET"

default-log-dir: /var/log/suricata

default-rule-path: /etc/suricata/rules

rule-files:
  - local.rules

outputs:
  - fast:
      enabled: yes
      filename: fast.log

  - eve-log:
      enabled: yes
      filename: eve.json


